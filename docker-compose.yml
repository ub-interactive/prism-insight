services:
  prism-insight:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: prism-insight-container
    image: prism-insight:latest

    environment:
      - TZ=Asia/Seoul
      - PYTHONUNBUFFERED=1
      - ENABLE_CRON=true

    volumes:
      - prism-data:/app/prism-insight/data
      - ./src/var/reports:/app/prism-insight/src/var/reports
      - ./src/var/pdf_reports:/app/prism-insight/src/var/pdf_reports
      - ./src/var/html_reports:/app/prism-insight/src/var/html_reports
      - ./src/var/logs:/app/prism-insight/src/var/logs
      - ./charts:/app/prism-insight/charts

      - ./.env:/app/prism-insight/.env
      - ./src/config/mcp_agent.config.yaml:/app/prism-insight/src/config/mcp_agent.config.yaml

      - ./stock_tracking_db.sqlite:/app/prism-insight/stock_tracking_db.sqlite

      - ./deploy/docker/crontab:/app/prism-insight/deploy/docker/crontab:ro

    working_dir: /app/prism-insight

    restart: unless-stopped

    network_mode: bridge

    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import sys; sys.exit(0)' && service cron status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  prism-data:
    driver: local
